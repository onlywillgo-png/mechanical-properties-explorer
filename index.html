<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Material Mechanical Properties Explorer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#eef2ff,#f8fafc);color:#1e293b;display:flex;align-items:center;justify-content:center;padding:24px}.app{width:100%;max-width:900px;text-align:center}h1{font-size:clamp(2rem,5vw,3.5rem);margin-bottom:16px;letter-spacing:-.04em;color:#0f172a}.subtitle{font-size:1rem;color:#64748b;margin-bottom:32px}.search-card{background:rgba(255,255,255,.9);border:1px solid #e2e8f0;border-radius:24px;padding:32px;box-shadow:0 20px 50px rgba(15,23,42,.08);backdrop-filter:blur(12px)}input{width:100%;max-width:560px;padding:16px 20px;border:2px solid #cbd5e1;border-radius:16px;font-size:1.05rem;outline:none;transition:.2s}input:focus{border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.12)}.hint{margin-top:16px;color:#64748b;font-size:.95rem}.chips{margin-top:24px;display:flex;justify-content:center;flex-wrap:wrap;gap:10px}.chip{border:1px solid #cbd5e1;background:#fff;color:#334155;border-radius:999px;padding:8px 14px;cursor:pointer;transition:.2s;font-size:.9rem}.chip:hover{background:#2563eb;border-color:#2563eb;color:#fff;transform:translateY(-1px)}.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}.modal-overlay.active{display:flex}.modal{width:100%;max-width:720px;background:#fff;border-radius:24px;padding:28px;text-align:left;box-shadow:0 30px 80px rgba(15,23,42,.28);animation:popIn .18s ease-out}@keyframes popIn{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}.modal-header{display:flex;justify-content:space-between;gap:16px;align-items:start;margin-bottom:20px}.modal-title{font-size:1.6rem;color:#0f172a}.modal-subtitle{margin-top:4px;color:#64748b;font-size:.95rem}.close-btn{border:0;background:#f1f5f9;color:#334155;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.3rem;line-height:1}.close-btn:hover{background:#e2e8f0}.property-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.property-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:16px}.property-label{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:8px}.property-value{font-size:1.15rem;font-weight:700;color:#0f172a}.modal-footer{margin-top:22px;color:#64748b;font-size:.92rem;text-align:center}canvas{width:100%;height:auto;border-radius:18px;background:#f8fafc;border:1px solid #e2e8f0}.unknown-message{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:18px;padding:18px;line-height:1.6}
</style>
</head>
<body>
<main class="app"><h1>Material Mechanical Properties Explorer</h1><p class="subtitle">Type a material name and press Enter. Press Enter again to view its stress–strain curve.</p><section class="search-card"><input id="materialInput" type="text" placeholder="Try Aluminum, Steel, Copper, Titanium, Silicon Carbide, Brass, or Glass" autocomplete="off"><p class="hint">Built-in database uses approximate typical values for educational visualization.</p><div class="chips" id="exampleChips"></div></section></main>
<div class="modal-overlay" id="modalOverlay"><div class="modal"><div class="modal-header"><div><h2 class="modal-title" id="modalTitle"></h2><p class="modal-subtitle" id="modalSubtitle"></p></div><button class="close-btn" id="closeModal" aria-label="Close modal">&times;</button></div><div id="modalContent"></div><p class="modal-footer" id="modalFooter"></p></div></div>
<script>
// Built-in material database with approximate typical mechanical properties.
const materials={"aluminum":{name:"Aluminum",fractureToughness:"22–35 MPa√m",tensileStrength:"90–570 MPa",youngsModulus:"69 GPa",poisson:"0.32–0.35",curve:{elasticStrain:.002,yieldStress:250,ultimateStress:310,fractureStrain:.16,brittle:false}},"steel":{name:"Steel",fractureToughness:"50–150 MPa√m",tensileStrength:"400–1200 MPa",youngsModulus:"200 GPa",poisson:"0.27–0.30",curve:{elasticStrain:.002,yieldStress:450,ultimateStress:650,fractureStrain:.22,brittle:false}},"copper":{name:"Copper",fractureToughness:"30–80 MPa√m",tensileStrength:"200–400 MPa",youngsModulus:"110–130 GPa",poisson:"0.33–0.36",curve:{elasticStrain:.002,yieldStress:150,ultimateStress:260,fractureStrain:.28,brittle:false}},"titanium":{name:"Titanium",fractureToughness:"55–115 MPa√m",tensileStrength:"240–950 MPa",youngsModulus:"105–120 GPa",poisson:"0.30–0.34",curve:{elasticStrain:.002,yieldStress:830,ultimateStress:950,fractureStrain:.14,brittle:false}},"silicon carbide":{name:"Silicon Carbide",fractureToughness:"3–5 MPa√m",tensileStrength:"200–500 MPa",youngsModulus:"400–450 GPa",poisson:"0.14–0.21",curve:{elasticStrain:.001,yieldStress:0,ultimateStress:420,fractureStrain:.0012,brittle:true}},"brass":{name:"Brass",fractureToughness:"25–60 MPa√m",tensileStrength:"300–600 MPa",youngsModulus:"95–110 GPa",poisson:"0.33–0.37",curve:{elasticStrain:.002,yieldStress:200,ultimateStress:430,fractureStrain:.24,brittle:false}},"glass":{name:"Glass",fractureToughness:"0.7–1.0 MPa√m",tensileStrength:"30–100 MPa",youngsModulus:"50–90 GPa",poisson:"0.18–0.25",curve:{elasticStrain:.001,yieldStress:0,ultimateStress:70,fractureStrain:.0015,brittle:true}}};
const input=document.getElementById("materialInput"),chips=document.getElementById("exampleChips"),overlay=document.getElementById("modalOverlay"),closeModal=document.getElementById("closeModal"),modalTitle=document.getElementById("modalTitle"),modalSubtitle=document.getElementById("modalSubtitle"),modalContent=document.getElementById("modalContent"),modalFooter=document.getElementById("modalFooter");let currentMaterial=null,enterStage=0;
// Creates clickable example material chips below the input box.
function createExampleChips(){Object.values(materials).forEach(m=>{const b=document.createElement("button");b.className="chip";b.textContent=m.name;b.addEventListener("click",()=>{input.value=m.name;currentMaterial=m;enterStage=1;showProperties(m)});chips.appendChild(b)})}
// Normalizes user input so small capitalization differences do not matter.
function findMaterial(q){return materials[q.trim().toLowerCase()]||null}
// Opens the modal window with custom content.
function openModal(t,s,html,foot=""){modalTitle.textContent=t;modalSubtitle.textContent=s;modalContent.innerHTML=html;modalFooter.textContent=foot;overlay.classList.add("active")}
// Shows the mechanical properties for the selected material.
function showProperties(m){openModal(m.name,"Key mechanical properties",`<div class="property-grid"><div class="property-card"><div class="property-label">Fracture Toughness</div><div class="property-value">${m.fractureToughness}</div></div><div class="property-card"><div class="property-label">Tensile Strength</div><div class="property-value">${m.tensileStrength}</div></div><div class="property-card"><div class="property-label">Young’s Modulus</div><div class="property-value">${m.youngsModulus}</div></div><div class="property-card"><div class="property-label">Possible Poisson’s Ratio</div><div class="property-value">${m.poisson}</div></div></div>`,"Press Enter again to view the stress–strain curve.")}
// Shows a friendly message when the material is not in the database.
function showUnknownMaterial(q){openModal("Material not found","Unknown material",`<div class="unknown-message">Sorry, “${q}” is not in the built-in database yet.<br>Try Aluminum, Steel, Copper, Titanium, Silicon Carbide, Brass, or Glass.</div>`,"You can add more materials by editing the materials object in JavaScript.")}
// Draws a simplified stress-strain curve on HTML Canvas.
function drawStressStrainCurve(m){const c=document.getElementById("stressCanvas"),ctx=c.getContext("2d"),w=c.width,h=c.height,p=60,cu=m.curve;ctx.clearRect(0,0,w,h);ctx.lineWidth=2;ctx.font="14px Arial";ctx.fillStyle="#0f172a";ctx.strokeStyle="#cbd5e1";for(let i=0;i<=5;i++){const x=p+i*((w-2*p)/5),y=h-p-i*((h-2*p)/5);ctx.beginPath();ctx.moveTo(x,p);ctx.lineTo(x,h-p);ctx.stroke();ctx.beginPath();ctx.moveTo(p,y);ctx.lineTo(w-p,y);ctx.stroke()}ctx.strokeStyle="#334155";ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(p,p);ctx.lineTo(p,h-p);ctx.lineTo(w-p,h-p);ctx.stroke();ctx.fillText("Stress",16,p-20);ctx.fillText("Strain",w-p-20,h-20);const maxS=cu.ultimateStress*1.15,maxE=cu.fractureStrain*1.15;const X=e=>p+e/maxE*(w-2*p),Y=s=>h-p-s/maxS*(h-2*p);const pts=cu.brittle?[[0,0],[cu.fractureStrain,cu.ultimateStress]]:[[0,0],[cu.elasticStrain,cu.yieldStress],[cu.fractureStrain*.45,cu.ultimateStress*.88],[cu.fractureStrain*.75,cu.ultimateStress],[cu.fractureStrain,cu.ultimateStress*.78]];ctx.strokeStyle="#2563eb";ctx.lineWidth=4;ctx.beginPath();pts.forEach(([e,s],i)=>i?ctx.lineTo(X(e),Y(s)):ctx.moveTo(X(e),Y(s)));ctx.stroke();const last=pts[pts.length-1];ctx.fillStyle="#dc2626";ctx.beginPath();ctx.arc(X(last[0]),Y(last[1]),6,0,Math.PI*2);ctx.fill();ctx.fillText("Fracture",X(last[0])-55,Y(last[1])-14);if(!cu.brittle){ctx.fillStyle="#16a34a";ctx.beginPath();ctx.arc(X(cu.elasticStrain),Y(cu.yieldStress),5,0,Math.PI*2);ctx.fill();ctx.fillStyle="#0f172a";ctx.fillText("Yield",X(cu.elasticStrain)+10,Y(cu.yieldStress)+4)}}
// Shows the Canvas-based stress-strain curve modal.
function showCurve(m){openModal(m.name,"Simplified stress–strain curve",`<canvas id="stressCanvas" width="800" height="460"></canvas>`,"This is a simplified educational curve, not exact experimental data.");drawStressStrainCurve(m)}
// Handles Enter key behavior: first Enter shows properties, second Enter shows curve.
input.addEventListener("keydown",e=>{if(e.key!=="Enter")return;const q=input.value.trim();if(!q)return;const m=findMaterial(q);if(!m){currentMaterial=null;enterStage=0;showUnknownMaterial(q);return}if(enterStage===0||currentMaterial!==m){currentMaterial=m;showProperties(m);enterStage=1}else{showCurve(m);enterStage=0}});
// Closes the modal when the close button or dark overlay is clicked.
closeModal.addEventListener("click",()=>overlay.classList.remove("active"));overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.classList.remove("active")});createExampleChips();
</script>
</body>
</html>
